<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>あいこメダル</title>
    <link rel="stylesheet" href="style.css?v=20260613-presentation-polish1">
  </head>
  <body>
    <main class="cabinet" aria-label="レトロアーケードじゃんけんゲーム">
      <div class="cabinet-art cabinet-art-shell" aria-hidden="true"></div>
      <div class="cabinet-art cabinet-art-rails" aria-hidden="true"></div>
      <div class="cabinet-art cabinet-art-screws" aria-hidden="true"></div>
      <header class="marquee">
        <div class="marquee-lamp"></div>
        <h1>あいこメダル</h1>
        <div class="marquee-lamp"></div>
      </header>
      <button id="muteButton" class="mute-button" type="button" aria-pressed="false">おと ON</button>

      <section class="bezel" aria-label="ゲーム画面">
        <div class="crt">
          <div class="scanlines"></div>
          <button id="startButton" class="start-overlay" type="button">
            <span>タップ</span>
            <strong>スタート</strong>
            <small>30まいで かち</small>
          </button>
          <button id="galleryButton" class="gallery-button" type="button" hidden>アルバム</button>
          <button id="relationResetButton" class="relation-reset-button" type="button" hidden>リセット</button>

          <div id="endOverlay" class="end-overlay" hidden>
            <p id="finalTitle" class="final-title">かち！</p>
            <p id="finalMessage" class="final-message">つづける？</p>
            <button id="retryButton" class="retry-button" type="button">もう一度勝負</button>
            <p class="countdown">じかん <strong id="countdown">10</strong></p>
          </div>

          <div id="sceneOverlay" class="scene-overlay" hidden>
            <img id="sceneIllustration" class="scene-illustration" alt="シーン演出画像" decoding="async" loading="lazy" hidden>
            <div class="scene-character">
              <img id="sceneCharacterImage" alt="あいてキャラクター演出" decoding="async" loading="lazy" hidden>
              <div id="sceneCharacterFallback" class="character-fallback" aria-hidden="true">
                <span class="face-eyes">● ●</span>
                <span class="face-mouth">▽</span>
              </div>
            </div>
            <div class="scene-dialog-box">
              <p id="sceneMessage" class="scene-message" aria-live="polite"></p>
              <button id="sceneNextButton" class="scene-next-button" type="button" hidden aria-label="次へ">
                ▼
              </button>
            </div>
          </div>

          <div id="galleryOverlay" class="gallery-overlay" hidden>
            <div class="gallery-window">
              <div class="gallery-header">
                <strong>アルバム</strong>
                <button id="galleryCloseButton" type="button">とじる</button>
              </div>
              <div class="gallery-preview">
                <img id="galleryImage" alt="Gallery image" decoding="async" loading="lazy" hidden>
                <div id="galleryLocked" class="gallery-locked" hidden>LOCKED</div>
              </div>
              <p id="galleryProgress" class="gallery-progress"></p>
              <p id="galleryCaption" class="gallery-caption"></p>
              <div class="gallery-controls">
                <button id="galleryPrevButton" type="button" aria-label="Previous gallery image">&lt;</button>
                <span id="galleryCounter"></span>
                <button id="galleryNextButton" type="button" aria-label="Next gallery image">&gt;</button>
              </div>
            </div>
          </div>

          <div class="scoreboard" aria-label="スコア">
            <span class="score-win">あなた <strong id="winCount">0</strong></span>
            <span class="score-pot">メダル <strong id="potCount">5</strong></span>
            <span class="score-lose">あいて <strong id="loseCount">0</strong></span>
            <span class="score-draw">あいこ <strong id="drawCount">0</strong></span>
          </div>
          <div id="medalRecordHud" class="medal-record-hud" aria-live="polite">
            <span>いま <strong id="currentMedalRecord">5</strong></span>
            <span>きろく <strong id="bestMedalRecord">0</strong></span>
            <em id="newMedalRecordBadge" hidden>新記録</em>
          </div>
          <div id="aikoGuideHud" class="aiko-guide-hud" aria-live="polite">
            <span id="phaseLabel">ふつう</span>
            <span id="nextChanceLabel">チャンスまで あと5</span>
            <span id="nextFinalLabel">さいごまで あと15</span>
          </div>

          <div class="stage">
            <div class="show-window">
              <p id="message" class="message" aria-live="polite">タップしてね</p>

              <div class="character-frame">
                <img id="characterImage" alt="あいてキャラクター" decoding="async" loading="eager" fetchpriority="high" hidden>
                <div id="characterFallback" class="character-fallback" aria-hidden="true">
                  <span class="face-eyes">● ●</span>
                  <span class="face-mouth">▽</span>
                </div>
              </div>

              <p id="moodBadge" class="mood-badge" aria-live="polite" hidden>きもち：ふつう</p>
              <p id="resultLabel" class="result-label" aria-live="polite"></p>
            </div>

            <div class="hands" aria-live="polite">
              <div class="hand-card">
                <span>あなた</span>
                <strong id="playerHand">?</strong>
              </div>
              <div class="versus">VS</div>
              <div class="hand-card">
                <span>あいて</span>
                <strong id="cpuHand">?</strong>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="control-panel" aria-label="操作パネル">
        <div class="panel-line"></div>
        <div id="inputGuide" class="input-guide" hidden aria-hidden="true">
          <span>てを えらんでね！</span>
          <strong>▼ ▼ ▼</strong>
        </div>
        <div class="choice-buttons">
          <button class="choice rock" type="button" data-hand="rock" aria-label="ぐー" disabled>
            <span class="choice-icon">
              <img src="assets/images/janken_gu.png?v=20260613-presentation-polish1" alt="" class="choice-hand-image" decoding="async" loading="eager">
            </span>
            <span>ぐー</span>
          </button>
          <button class="choice scissors" type="button" data-hand="scissors" aria-label="ちょき" disabled>
            <span class="choice-icon">
              <img src="assets/images/janken_choki.png?v=20260613-presentation-polish1" alt="" class="choice-hand-image" decoding="async" loading="eager">
            </span>
            <span>ちょき</span>
          </button>
          <button class="choice paper" type="button" data-hand="paper" aria-label="ぱー" disabled>
            <span class="choice-icon">
              <img src="assets/images/janken_pa.png?v=20260613-presentation-polish1" alt="" class="choice-hand-image" decoding="async" loading="eager">
            </span>
            <span>ぱー</span>
          </button>
        </div>
      </section>
    </main>

    <script src="script.js?v=20260613-presentation-polish1"></script>
  </body>
</html>
